name: ios_tvbox
description: TVBox Flutter跨平台客户端
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.41.6'

dependencies:
  flutter:
    sdk: flutter
  # 状态管理
  provider: ^6.1.1
  # 网络请求
  dio: ^5.4.0
  # JS爬虫引擎
  flutter_js: ^0.8.0
  # Python爬虫引擎
  python_ffi: ^0.6.0
  python_ffi_dart: ^0.4.4
  # XPath解析
  xpath_selector: ^2.0.0
  xpath_selector_html_parser: ^1.0.0
  # 本地存储
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  path: ^1.9.0
  # 播放器
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_native_event_loop: ^1.0.8
  # 加密工具
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/js/
