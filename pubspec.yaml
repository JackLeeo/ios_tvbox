name: ios_tvbox
description: TVBox Flutter跨平台客户端
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.41.6'

dependencies:
  flutter:
    sdk: flutter
  # 状态管理（官方推荐，稳定可用）
  provider: ^6.1.1
  # 网络请求（Flutter生态最主流，官方verified发布）
  dio: ^5.5.0+1
  # 【修正后兼容版】Flutter官方维护，100%适配Flutter 3.41.6
  webview_flutter: ^4.13.1
  # HTML解析（Dart官方维护，永久可用）
  html: ^0.15.4
  # 语法解析（pub.dev verified发布，稳定可用）
  petitparser: ^6.1.0
  # 本地存储（官方维护，verified发布）
  sqflite: ^2.3.3+1
  shared_preferences: ^2.3.2
  path_provider: ^2.1.5
  path: ^1.9.0
  # 播放器核心（全平台稳定可用）
  media_kit: ^1.1.10+1
  media_kit_video: ^1.3.1
  media_kit_native_event_loop: ^1.0.9
  # 加密工具（官方维护，稳定可用）
  crypto: ^3.0.5
  # 日期处理（补全缺失依赖）
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/js/
