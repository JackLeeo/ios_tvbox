name: Build iOS TVBox Release (TrollStore专用无签名版)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios-trollstore-unsigned:
    runs-on: macos-14
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: 锁定Xcode稳定兼容版本
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: 全量清理构建缓存
        run: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock ios/build .dart_tool build
          rm -rf ~/Library/Developer/Xcode/DerivedData/*

      - name: 预检查（Dart静态分析）
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: 验证 NodeMobile framework 结构
        run: |
          echo "📁 检查 ios/Frameworks 目录："
          ls -la ios/Frameworks/
          echo ""
          echo "📂 检查Headers目录："
          ls -la "ios/Frameworks/NodeMobile.xcframework/ios-arm64/NodeMobile.framework/Headers/"

      - name: 手动修改桥接头文件导入路径
        run: |
          BRIDGING_HEADER="ios/Runner/Runner-Bridging-Header.h"
          # 你给的头文件真实相对路径
          RELATIVE_PATH="../Frameworks/NodeMobile.xcframework/ios-arm64/NodeMobile.framework/Headers/NodeMobile.h"
          
          sed -i.bak "s|#import <NodeMobile/NodeMobile.h>|#import \"$RELATIVE_PATH\"|g" "$BRIDGING_HEADER"
          rm -f "$BRIDGING_HEADER.bak"
          
          echo "✅ 桥接头文件修改完成，新内容："
          cat "$BRIDGING_HEADER"

      - name: 重新安装iOS依赖
        run: |
          flutter pub get
          cd ios
          pod deintegrate
          pod install --repo-update
          cd ..

      - name: 无签名构建（TrollStore专用）
        run: |
          flutter build ios --release --no-codesign --config-only
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            clean archive \
            -archivePath $PWD/build/Runner.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO
          cp -R build/Runner.xcarchive/Products/Applications/Runner.app ../build/ios/iphoneos/
          cd ..

      - name: 校验构建产物
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "✅ 无签名APP构建成功"
            ls -la build/ios/iphoneos/Runner.app
          else
            echo "❌ 构建失败：未找到 Runner.app"
            exit 1
          fi

      - name: 打包 IPA（TrollStore 专用）
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r tvbox_trollstore_unsigned.ipa Payload/
          rm -rf Payload/

      - name: 校验 IPA 生成
        run: |
          if [ -f "tvbox_trollstore_unsigned.ipa" ]; then
            echo "✅ IPA 生成成功"
            ls -la tvbox_trollstore_unsigned.ipa
          else
            echo "❌ IPA 生成失败"
            exit 1
          fi

      - name: 上传无签名 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: tvbox_trollstore_unsigned_ipa
          path: tvbox_trollstore_unsigned.ipa
          retention-days: 30
