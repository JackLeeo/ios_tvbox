name: Build iOS TVBox
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: 清理缓存
        run: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock ios/build .dart_tool build
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          rm -rf ~/Library/Developer/Xcode/ModuleCache.noindex

      - name: 下载NodeMobile iOS框架
        run: |
          cd ios/Frameworks
          curl -L -o nodejs-mobile-ios.zip https://github.com/nodejs-mobile/nodejs-mobile/releases/download/v18.20.4/nodejs-mobile-v18.20.4-ios.zip
          rm nodejs-mobile-ios.zip
          # � 这里！把解压出来的真机版本的framework复制到Frameworks根目录！
          cp -R Release-iphoneos/NodeMobile.framework ./
          echo "✅ 已下载并解压NodeMobile框架"

      - name: 检查NodeMobile二进制文件
        run: |
          ls -la ios/Frameworks/
          ls -la ios/Frameworks/NodeMobile.framework/
          file ios/Frameworks/NodeMobile.framework/NodeMobile

      - name: 获取Dart依赖
        run: flutter pub get

      - name: 静态检查
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: 生成自定义桥接头
        run: |
          echo "#ifndef Runner_Bridging_Header_h" > ios/Runner/Runner-Bridging-Header.h
          echo "#define Runner_Bridging_Header_h" >> ios/Runner/Runner-Bridging-Header.h
          echo "" >> ios/Runner/Runner-Bridging-Header.h
          echo "#import \"GeneratedPluginRegistrant.h\"" >> ios/Runner/Runner-Bridging-Header.h
          echo "#import <Flutter/Flutter.h>" >> ios/Runner/Runner-Bridging-Header.h
          echo "" >> ios/Runner/Runner-Bridging-Header.h
          echo "@interface NodeJSBridge : NSObject" >> ios/Runner/Runner-Bridging-Header.h
          echo "+ (void)registerWithRegistrar:(NSObject<FlutterPluginRegistrar> *)registrar;" >> ios/Runner/Runner-Bridging-Header.h
          echo "@end" >> ios/Runner/Runner-Bridging-Header.h
          echo "" >> ios/Runner/Runner-Bridging-Header.h
          echo "#endif" >> ios/Runner/Runner-Bridging-Header.h

      - name: 重新安装iOS依赖
        run: |
          flutter pub get
          cd ios
          pod deintegrate
          pod install --repo-update

      - name: 最终检查NodeMobile.framework
        run: |
          cd ios
          ls -la Frameworks/
          ls -la Frameworks/NodeMobile.framework/
          file Frameworks/NodeMobile.framework/NodeMobile

      - name: 无签名构建
        run: |
          flutter build ios --release --no-codesign --config-only
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            clean archive \
            -archivePath $PWD/build/Runner.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO
          cp -R build/Runner.xcarchive/Products/Applications/Runner.app ../build/ios/iphoneos/

      - name: 打包IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r tvbox_trollstore_unsigned.ipa Payload/
          rm -rf Payload/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: tvbox_trollstore_unsigned_ipa
          path: tvbox_trollstore_unsigned.ipa
          retention-days: 30
