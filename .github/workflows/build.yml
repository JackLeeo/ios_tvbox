name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Download Official Native NodeMobile Framework
        run: |
          echo "=== 下载官方原生 NodeMobile 框架 ==="
          VERSION="v18.20.4"
          DOWNLOAD_URL="https://github.com/nodejs-mobile/nodejs-mobile/releases/download/${VERSION}/nodejs-mobile-${VERSION}-ios.zip"
          TARGET_DIR="ios/Frameworks"
          mkdir -p $TARGET_DIR
          rm -rf $TARGET_DIR/NodeMobile.xcframework

          curl -fSL "$DOWNLOAD_URL" -o nodejs-mobile.zip || {
            echo "❌ 框架下载失败"
            exit 1
          }

          TEMP_DIR=$(mktemp -d)
          unzip -q nodejs-mobile.zip -d $TEMP_DIR

          FRAMEWORK_PATH=$(find $TEMP_DIR -name "NodeMobile.xcframework" -type d | head -1)
          if [ -z "$FRAMEWORK_PATH" ]; then
            echo "❌ 未找到 NodeMobile.xcframework"
            exit 1
          fi

          cp -r "$FRAMEWORK_PATH" $TARGET_DIR/
          rm -rf $TEMP_DIR nodejs-mobile.zip

          echo "✅ 框架已放置到 $TARGET_DIR/NodeMobile.xcframework"

      - name: Verify NodeMobile Framework Structure
        run: |
          echo "=== 验证 NodeMobile 框架文件完整性 ==="
          FRAMEWORK_PATH="ios/Frameworks/NodeMobile.xcframework"
          REQUIRED_PATHS=(
            "$FRAMEWORK_PATH/Info.plist"
            "$FRAMEWORK_PATH/ios-arm64/NodeMobile.framework/NodeMobile"
            "$FRAMEWORK_PATH/ios-arm64/NodeMobile.framework/Info.plist"
          )

          MISSING_FILES=0
          for path in "${REQUIRED_PATHS[@]}"; do
            if [ ! -e "$path" ]; then
              echo "❌ 缺失必要文件: $path"
              MISSING_FILES=$((MISSING_FILES + 1))
            fi
          done

          if [ $MISSING_FILES -gt 0 ]; then
            echo "❌ 框架文件不完整，缺少 $MISSING_FILES 个必要组件"
            exit 1
          fi

          echo "✅ 框架文件结构完整"

      - name: Verify Required Symbols
        run: |
          echo "=== 验证关键 C 符号 ==="
          BINARY_PATH="ios/Frameworks/NodeMobile.xcframework/ios-arm64/NodeMobile.framework/NodeMobile"

          REQUIRED_SYMBOLS=("_node_start")

          ALL_SYMBOLS=$(mktemp)
          nm -gU "$BINARY_PATH" 2>/dev/null > "$ALL_SYMBOLS"

          MISSING_SYMBOLS=0
          for sym in "${REQUIRED_SYMBOLS[@]}"; do
            if grep -q "$sym" "$ALL_SYMBOLS"; then
              echo "✅ 符号存在: $sym"
            else
              echo "❌ 符号缺失: $sym"
              MISSING_SYMBOLS=$((MISSING_SYMBOLS + 1))
            fi
          done

          rm -f "$ALL_SYMBOLS"

          if [ $MISSING_SYMBOLS -gt 0 ]; then
            echo "❌ 错误：框架中缺失必要符号"
            exit 1
          fi

          echo "✅ 必要符号验证通过"

      - name: Install Flutter Dependencies
        run: |
          echo "=== 安装 Flutter 依赖 ==="
          flutter pub get
          echo "✅ Flutter 依赖安装完成"

      - name: Install iOS Pods
        run: |
          echo "=== 安装 iOS CocoaPods 依赖 ==="
          cd ios
          pod install --repo-update
          cd ..
          echo "✅ Pod 依赖安装完成"

      - name: Verify Node.js resources
        run: |
          echo "=== 验证 Node.js 脚本资源 ==="
          SCRIPT_PATH="ios/Runner/main.js"
          MISSING=0

          if [ ! -f "$SCRIPT_PATH" ]; then
            echo "❌ 缺少脚本文件: $SCRIPT_PATH"
            MISSING=1
          else
            echo "✅ 脚本文件存在: $SCRIPT_PATH"
            if grep -q "process._linkedBinding('myaddon')" "$SCRIPT_PATH"; then
              echo "⚠️ 警告：脚本中引用了旧的myaddon绑定，已在项目中适配为新的channel API"
            else
              echo "✅ 脚本已适配新的channel通信API，符合原生框架要求"
            fi
          fi

          if [ $MISSING -eq 1 ]; then
            echo "❌ 缺少必要的 Node.js 资源文件，构建中止。"
            exit 1
          fi

          echo "✅ Node.js 资源文件验证通过"

      - name: Install Node.js Dependencies
        run: |
          echo "=== 安装Node.js依赖（如果需要） ==="
          cd ios/Runner/
          if [ -f "package.json" ]; then
            npm install --production
            echo "✅ 依赖安装完成，已打包到资源目录"
          else
            echo "✅ 未发现package.json，Node.js代码已预打包，无需安装依赖"
          fi        

      - name: Build TVBox
        run: |
          echo "=== 清理所有旧的构建缓存 ==="
          cd ios
          # 删除旧的DerivedData，解决路径缓存冲突
          rm -rf DerivedData
          echo "=== 清理构建目录 ==="
          xcodebuild clean -workspace Runner.xcworkspace -scheme Runner -destination 'generic/platform=iOS' || echo "清理完成"  
          echo "=== 开始构建应用 ==="
          set +o pipefail
          xcodebuild build -configuration Release\
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./DerivedData \
            2>&1 | tee build.log
          
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          
          # 生成错误摘要文件
          echo "=== 生成错误摘要 ===" > error_summary.txt
          grep -n -B5 -A5 "error:" build.log >> error_summary.txt || echo "未找到错误信息" >> error_summary.txt
          
          if [ $BUILD_EXIT_CODE -eq 0 ]; then
            echo "✅ 构建成功"
            
            APP_PATH=$(find ./DerivedData -name "Runner.app" -type d | head -1)
            
            if [ -z "$APP_PATH" ]; then
              echo "❌ 未找到.app文件"
              find ./DerivedData -name "*.app" -type d
              exit 1
            fi
            
            echo "APP_PATH: $APP_PATH"
            
            # 验证.app包结构
            echo "=== 验证.app包结构 ==="
            if [ -f "$APP_PATH/Runner" ]; then
              echo "✅ 可执行文件存在"
            else
              echo "⚠️ 可执行文件不存在，检查其他文件:"
              find "$APP_PATH" -type f -name "*" | grep -v ".DS_Store"
            fi
            
            if [ ! -f "$APP_PATH/Info.plist" ]; then
              echo "⚠️ Info.plist不存在，创建自动修复"
              printf '%s\n' \
                '<?xml version="1.0" encoding="UTF-8"?>' \
                '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
                '<plist version="1.0">' \
                '<dict>' \
                '    <key>CFBundleDevelopmentRegion</key><string>en</string>' \
                '    <key>CFBundleDisplayName</key><string>TVBox</string>' \
                '    <key>CFBundleExecutable</key><string>Runner</string>' \
                '    <key>CFBundleIdentifier</key><string>com.tvbox.app</string>' \
                '    <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>' \
                '    <key>CFBundleName</key><string>TVBox</string>' \
                '    <key>CFBundlePackageType</key><string>APPL</string>' \
                '    <key>CFBundleShortVersionString</key><string>1.0.0</string>' \
                '    <key>CFBundleVersion</key><string>1</string>' \
                '    <key>LSRequiresIPhoneOS</key><true/>' \
                '    <key>UIApplicationSupportsIndirectInputEvents</key><true/>' \
                '    <key>UILaunchScreen</key><dict/>' \
                '    <key>UIRequiredDeviceCapabilities</key><array><string>armv7</string></array>' \
                '    <key>UISupportedInterfaceOrientations</key><array><string>UIInterfaceOrientationPortrait</string><string>UIInterfaceOrientationLandscapeLeft</string><string>UIInterfaceOrientationLandscapeRight</string></array>' \
                '    <key>UISupportedInterfaceOrientations~ipad</key><array><string>UIInterfaceOrientationPortrait</string><string>UIInterfaceOrientationPortraitUpsideDown</string><string>UIInterfaceOrientationLandscapeLeft</string><string>UIInterfaceOrientationLandscapeRight</string></array>' \
                '    <key>NSAppTransportSecurity</key><dict><key>NSAllowsArbitraryLoads</key><true/></dict>' \
                '</dict></plist>' \
                > "$APP_PATH/Info.plist"
              echo "✅ Info.plist 创建完成"
            fi
            
            if [ ! -f "$APP_PATH/PkgInfo" ]; then
              echo "APPL????" > "$APP_PATH/PkgInfo"
              echo "✅ 已创建PkgInfo"
            fi
            
            if [ -f "$APP_PATH/Info.plist" ] && [ -f "$APP_PATH/Runner" ]; then
              /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable Runner" "$APP_PATH/Info.plist" 2>/dev/null || true
            fi
            
            echo ".app包内容:"
            ls -la "$APP_PATH/"
            
            # 打包IPA
            echo "=== 打包IPA ==="
            mkdir -p ./Build
            TEMP_DIR=$(mktemp -d)
            mkdir -p "$TEMP_DIR/Payload"
            cp -r "$APP_PATH" "$TEMP_DIR/Payload/"
            cd "$TEMP_DIR"
            zip -r "$GITHUB_WORKSPACE/Build/tvbox-Flutter-TrollStore.ipa" Payload
            cd "$GITHUB_WORKSPACE"
            rm -rf "$TEMP_DIR"
            
            echo "✅ IPA打包完成: ./Build/tvbox-Flutter-TrollStore.ipa"
            ls -lh ./Build/tvbox-Flutter-TrollStore.ipa
            
          else
            echo "❌ 构建失败，退出码: $BUILD_EXIT_CODE"
            echo "=== 错误摘要（最后50行） ==="
            tail -50 build.log
            echo ""
            echo "完整错误信息请下载 build-logs artifact"
            exit 1
          fi
          cd ..

      - name: Upload IPA Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Flutter-TrollStore
          path: ./Build/tvbox-Flutter-TrollStore.ipa
          retention-days: 30

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ./ios/build.log
            ./ios/error_summary.txt
          retention-days: 7
