      - name: 修复头文件路径（把单独的头文件复制到xcframework里）
        run: |
          # 把单独的NodeMobile.h复制到xcframework的各个平台的Headers目录，解决头文件找不到的问题
          NODE_H_PATH="NodeMobile.h"
          if [ ! -f "$NODE_H_PATH" ]; then
            echo "❌ 错误：未找到NodeMobile.h，路径: $NODE_H_PATH"
            # 打印目录，帮我们确认文件到底在哪
            echo "当前项目根目录文件列表："
            ls -la
            echo "ios子目录文件列表："
            ls -la ios/
            exit 1
          fi
          echo "📝 正在把NodeMobile.h复制到xcframework的Headers目录..."
          # 遍历所有平台的framework目录
          for platform_dir in ios/Frameworks/NodeMobile.xcframework/*/; do
            headers_dir="${platform_dir}NodeMobile.framework/Headers"
            mkdir -p "$headers_dir"
            cp "$NODE_H_PATH" "$headers_dir/"
            echo "✅ 已复制到: $headers_dir"
            # 验证复制是否成功
            if [ -f "${headers_dir}/NodeMobile.h" ]; then
              echo "✅ 验证：头文件已成功写入 ${headers_dir}/NodeMobile.h"
            else
              echo "❌ 错误：头文件复制失败到 ${headers_dir}"
              exit 1
            fi
          done
