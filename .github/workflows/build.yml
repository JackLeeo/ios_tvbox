name: 打包无签名iOS IPA（TrollStore兼容）  
on:
  workflow_dispatch:  
  push:
    branches: [main]  

jobs:
  build_unsigned_ipa:
    runs-on: macos-14  
    timeout-minutes: 40  

    steps:
      # 1. 拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  

      # 2. 安装Flutter 3.41.6
      - name: 安装Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6  
          channel: stable
          cache: true
          cache-key: flutter-3.41.6-ios  
          cache-path: ${{ runner.tool_cache }}/flutter

      # 3. 配置Flutter
      - name: 配置Flutter
        run: |
          flutter config --no-analytics --no-cli-animations  
          flutter --version  
          flutter clean  

      # 4. 安装项目依赖（生成Generated.xcconfig）
      - name: 安装项目依赖
        run: flutter pub get  

      # 5. 恢复Pods缓存
      - name: 恢复Pods缓存
        uses: actions/cache@v4
        with:
          path: ios/Pods  
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}  
          restore-keys: |  
            ${{ runner.os }}-pods-

      # 6. 安装Pods（用修正后的Podfile）
      - name: 安装Pods
        run: |
          cd ios
          pod install --repo-update --silent  

      # 7. 编译无签名iOS包
      - name: 编译iOS Release（无签名）
        run: flutter build ios --release --no-codesign --verbose  

      # 8. 生成IPA
      - name: 生成IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -q -r -9 tvbox_unsigned.ipa Payload
          echo "✅ 无签名IPA生成成功"
          echo "📦 文件路径: $(pwd)/tvbox_unsigned.ipa"
          echo "📏 文件大小: $(du -h tvbox_unsigned.ipa | awk '{print $1}')"

      # 9. 上传IPA
      - name: 上传IPA
        uses: actions/upload-artifact@v4
        with:
          name: tvbox_unsigned_ios_ipa  
          path: build/ios/iphoneos/tvbox_unsigned.ipa  
          retention-days: 30
