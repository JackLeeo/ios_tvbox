name: Build iOS TVBox Release
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios-unsigned:
    runs-on: macos-14
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: false # 关闭缓存，彻底避免旧缓存污染

      - name: 【关键预检查】Dart静态分析（提前发现所有编译错误）
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos --no-fatal-warnings # 只拦截致命错误

      - name: 【强制彻底清理】全量清理构建缓存
        run: |
          flutter clean
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          rm -rf .dart_tool
          rm -rf build

      - name: 重新安装依赖
        run: |
          flutter pub get
          cd ios && pod deintegrate && pod install --repo-update --verbose

      - name: Xcode Archive 无签名归档（开启详细日志）
        run: |
          cd ios
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build/Runner.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -verbose # 开启详细日志，定位脚本失败原因

      - name: Export 无签名 IPA
        run: |
          cd ios
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportPath build/export_unsigned \
            -exportOptionsPlist ../exportOptions.plist \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload unsigned IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-iOS-Unsigned-IPA
          path: ios/build/export_unsigned/*.ipa
