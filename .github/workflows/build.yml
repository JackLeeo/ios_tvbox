name: Build TVBox
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-ios:
    runs-on: macos-14  # 必须用 macOS 14+
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'  # 和文档推荐版本严格一致
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get  # 关键：必须在 pod install 前执行

      - name: Install iOS Pods
        run: |
          cd ios
          pod install --repo-update  # 加上 --repo-update 避免源过时

      - name: Build unsigned iOS IPA
        run: flutter build ios --release --no-codesign

      - name: Export IPA
        run: |
          cd ios
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ../exportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvbox_unsigned_ios_ipa
          path: ios/build/ios/ipa/*.ipa
