# 构建iOS TVBox的GitHub Actions工作流
name: Build iOS TVBox

# 触发条件：推送到main分支，或提交PR到main分支
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # iOS构建必须使用macOS运行器
    runs-on: macos-latest
    steps:
      # 1. 检出项目代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装Flutter环境，匹配项目的Dart 3.3.0要求
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # 适配你的项目Dart SDK >=3.3.0的要求
          channel: 'stable'
          cache: true # 缓存Flutter依赖，加速后续构建

      # 3. 获取项目Dart依赖，生成Generated.xcconfig配置文件
      - name: Get Flutter dependencies
        run: flutter pub get

      # 4. 预下载iOS编译所需的工具与 artifacts，避免CI环境缺失文件
      - name: Precache iOS build artifacts
        run: flutter precache --ios

      # 5. 安装最新版本的CocoaPods
      - name: Install CocoaPods
        run: sudo gem install cocoapods

      # 6. 安装iOS Pod依赖（已修复路径问题，可正常执行）
      - name: Install iOS pods
        run: |
          cd ios
          pod install --repo-update

      # 7. 构建Release版本的iOS应用，适配TrollStore无需代码签名
      - name: Build iOS release app
        run: flutter build ios --release --no-codesign
