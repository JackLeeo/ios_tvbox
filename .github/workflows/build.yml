name: Build iOS TVBox Release (TrollStore专用无签名版)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios-trollstore-unsigned:
    runs-on: macos-14
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: 锁定Xcode稳定兼容版本
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: false

      - name: 预检查（Dart静态分析）
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: 强制清理所有构建缓存
        run: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock ios/build .dart_tool build
          rm -rf ~/Library/Developer/Xcode/DerivedData/*

      - name: 重新安装项目依赖
        run: |
          flutter pub get
          cd ios && pod deintegrate && pod install --repo-update

      - name: 验证 NodeMobile framework 结构
        run: |
          echo "📁 检查 ios/Frameworks 目录："
          ls -la ios/Frameworks/ || echo "目录不存在"
          echo ""
          echo "📂 递归列出 NodeMobile.xcframework 内容："
          if [ -d "ios/Frameworks/NodeMobile.xcframework" ]; then
            ls -R ios/Frameworks/NodeMobile.xcframework/
          else
            echo "❌ NodeMobile.xcframework 未找到！"
            exit 1
          fi
          echo ""
          echo "🔍 查找所有 .h 头文件："
          find ios/Frameworks -name "*.h" 2>/dev/null || echo "未找到头文件"

      - name: 无签名构建（Flutter）
        run: flutter build ios --release --no-codesign --verbose

      - name: 校验构建产物
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "✅ 无签名APP构建成功"
            ls -la build/ios/iphoneos/Runner.app
          else
            echo "❌ 构建失败：未找到 Runner.app"
            exit 1
          fi

      - name: 打包 IPA（TrollStore 专用）
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r tvbox_trollstore_unsigned.ipa Payload/
          rm -rf Payload/

      - name: 校验 IPA 生成
        run: |
          if [ -f "tvbox_trollstore_unsigned.ipa" ]; then
            echo "✅ IPA 生成成功"
            ls -la tvbox_trollstore_unsigned.ipa
          else
            echo "❌ IPA 生成失败"
            exit 1
          fi

      - name: 上传无签名 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: tvbox_trollstore_unsigned_ipa
          path: tvbox_trollstore_unsigned.ipa
          retention-days: 30
