name: 打包无签名iOS IPA（TrollStore兼容）  
on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [main]  # 推送到main分支自动触发

jobs:
  build_unsigned_ipa:
    runs-on: macos-14  # 需macOS 14+支持最新Xcode
    timeout-minutes: 40  # 防止构建超时

    steps:
      # 1. 拉取项目代码（浅克隆加速）
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  

      # 2. 安装Flutter 3.41.6（与本地一致，满足依赖要求）
      - name: 安装Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6  # 升级到项目要求的版本（解决flutter_lints依赖失败）
          channel: stable
          cache: true
          cache-key: flutter-3.41.6-ios  # 更新缓存键（避免旧版本干扰）
          cache-path: ${{ runner.tool_cache }}/flutter

      # 3. 配置Flutter环境（禁用干扰项+清理缓存）
      - name: 配置Flutter
        run: |
          flutter config --no-analytics --no-cli-animations  
          flutter --version  # 验证版本（应输出Flutter 3.41.6）
          flutter clean  # 清理旧构建产物

      # 4. 安装Dart/Flutter依赖（此时版本兼容，无报错）
      - name: 安装项目依赖
        run: flutter pub get  

      # 5. 恢复CocoaPods缓存（基于Podfile.lock哈希）
      - name: 恢复Pods缓存
        uses: actions/cache@v4
        with:
          path: ios/Pods  
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}  
          restore-keys: |  
            ${{ runner.os }}-pods-

      # 6. 安装iOS依赖（CocoaPods，依赖修正后的Podfile）
      - name: 安装Pods
        run: |
          cd ios
          pod install --repo-update --silent  # 静默安装（适配修正后的Podfile）

      # 7. 编译无签名iOS Release包（--no-codesign兼容TrollStore）
      - name: 编译iOS Release（无签名）
        run: flutter build ios --release --no-codesign --verbose  

      # 8. 生成IPA（手动打包为TrollStore兼容格式）
      - name: 生成IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -q -r -9 tvbox_unsigned.ipa Payload
          echo "✅ 无签名IPA生成成功"
          echo "📦 文件路径: $(pwd)/tvbox_unsigned.ipa"
          echo "📏 文件大小: $(du -h tvbox_unsigned.ipa | awk '{print $1}')"

      # 9. 上传IPA到GitHub Artifacts（保留30天）
      - name: 上传IPA
        uses: actions/upload-artifact@v4
        with:
          name: tvbox_unsigned_ios_ipa  
          path: build/ios/iphoneos/tvbox_unsigned.ipa  
          retention-days: 30
